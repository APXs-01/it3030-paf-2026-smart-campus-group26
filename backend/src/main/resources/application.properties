spring.application.name=smart-campus-backend

# Server
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_campus
spring.datasource.username=postgres
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=your_google_client_id
spring.security.oauth2.client.registration.google.client-secret=your_google_client_secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}


# JWT
app.jwt.secret=${JWT_SECRET:your_jwt_secret_key_replace_in_production}
app.jwt.expiration=86400000

# OAuth2 redirect
app.oauth2.authorized-redirect-uris=http://localhost:5173/oauth2/redirect

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
app.file.upload-dir=uploads

# CORS
app.cors.allowed-origins=http://localhost:5173

# Admin
app.admin.email=your_admin_email@gmail.com

# Email (Gmail SMTP — use an App Password, not your account password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_gmail@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
